name: CI Staging

on:
  pull_request:
    branches:
      - staging

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Lint and Build
        run: |
          npx htmlhint "**/*.html"
          npx stylelint "**/*.css"
          npx parcel build *.html --no-optimize

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-${{ github.sha }}

      - name: Tag Image
        run: echo "Applying tags :staging-latest and :staging-${{ github.sha }}"

      - name: Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-${{ github.sha }}
