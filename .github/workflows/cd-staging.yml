name: CD-Staging

on:
    push:
        branches:
            - staging

jobs:
    deploy-to-staging:
        runs-on: ubuntu-latest

        environment:
            name: staging
            url: https://your-staging-render-url.onrender.com

        steps:
          - name: Checkout Repository
            uses: actions/checkout@v4

          - name: Trigger Render Staging Deployment
            run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING_URL }}"

          - name: Confirm Deployment
            run: echo "Deployment to staging triggered at $(date)"
