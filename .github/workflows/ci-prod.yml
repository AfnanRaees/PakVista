# .github/workflows/ci-prod.yml
# CI Pipeline for Production Environment
# Trigger: Pull Request targeting the 'main' branch
# Author: Member 4

name: ci-prod

on:
  pull_request:
    branches:
      - main

jobs:
  ci-prod:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: npm ci

      - name: Lint HTML Files
        run: npx htmlhint "source/**/*.html"

      - name: Lint CSS Files
        run: npx stylelint "styles/**/*.css"

      - name: Build with Parcel
        run: npx parcel build "index.html" --dist-dir "dist" --public-url "/"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:prod-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:prod-${{ github.sha }}